<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>HOME</title>
</head>
<body>
<div layout:fragment="content">

    <!-- 필터(태그/검색) 안내 라벨 -->
    <h1 class="page-title" th:if="${filterLabel != null}" th:text="${filterLabel}">필터</h1>
    <h1 class="page-title" th:unless="${filterLabel != null}">최근 글</h1>

    <!-- 글 목록 (공통 프래그먼트 사용) -->
    <div th:replace="~{fragments/postList :: list(${posts})}"></div>

    <!-- 페이지 넘김 (홈에서만, 2페이지 이상일 때) -->
    <nav class="pagination" th:if="${totalPages != null and totalPages > 1}">
        <!-- 이전 -->
        <a class="page-link" th:classappend="${currentPage == 1} ? 'disabled'"
           th:href="@{/(page=${currentPage - 1})}">‹</a>
        <!-- 1 2 3 ... -->
        <a class="page-link" th:each="i : ${#numbers.sequence(1, totalPages)}"
           th:href="@{/(page=${i})}"
           th:text="${i}"
           th:classappend="${i == currentPage} ? 'active'">1</a>
        <!-- 다음 -->
        <a class="page-link" th:classappend="${currentPage == totalPages} ? 'disabled'"
           th:href="@{/(page=${currentPage + 1})}">›</a>
    </nav>

</div>
</body>
</html>
